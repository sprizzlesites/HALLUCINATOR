name: Fetch VCTK RAVE model

# One-off: this sandbox's dev environment blocks play.forum.ircam.fr (same
# network policy that blocks huggingface.co and download.pytorch.org), so
# the pretrained model can't be fetched directly there. GitHub Actions
# runners aren't network-restricted the same way, so this job downloads it
# there instead.
#
# Published as a GitHub Release asset, NOT committed into the git tree: the
# file is ~169MB, which is past git's hard 100MB-per-file limit (confirmed -
# the first version of this workflow tried a plain `git commit` + push and
# GitHub rejected it: "GH001: Large files detected"). Git LFS would work
# size-wise, but LFS storage/bandwidth is metered separately from normal git
# even on public repos (a small free quota, unlike regular git objects which
# are unlimited on public repos) - every clone or re-download would eat into
# it. A Release asset has neither constraint (up to 2GB, ordinary bandwidth)
# while still living in this repository under the Releases tab.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download VCTK model
        run: |
          curl -fL "https://play.forum.ircam.fr/rave-vst-api/get_model/VCTK" -o vctk_rave_model.ts
          ls -la vctk_rave_model.ts
          file vctk_rave_model.ts
          # Sanity check: a real torchscript file is a zip archive under the
          # hood. Fail loudly instead of publishing an HTML error page if the
          # download silently returned something else.
          file vctk_rave_model.ts | grep -qi zip

      - name: Publish as a GitHub Release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create vctk-rave-model-v1 vctk_rave_model.ts \
            --title "VCTK pretrained RAVE model" \
            --notes "Fetched from https://play.forum.ircam.fr/rave-vst-api/get_model/VCTK via CI - that host is blocked from the project's own dev sandbox network. See Resources/MODEL_INTERFACE.md for how HALLUCINATOR loads this file." \
            || gh release upload vctk-rave-model-v1 vctk_rave_model.ts --clobber

  # Verifies RaveModel against the real checkpoint on THIS runner, rather
  # than trying to get the 168MB file into the project's own dev sandbox to
  # test it there. Tried three ways to pull it into that sandbox - the
  # Release asset's presigned S3 redirect (401, looks like the sandbox's
  # TLS-terminating proxy interfering with AWS SigV4 signing),
  # api.github.com's octet-stream asset endpoint (403, direct raw API access
  # needs an org admin to connect the GitHub App for that sandbox), and a
  # workflow-artifact's presigned Azure Blob URL (403, that host isn't on
  # the sandbox's egress allowlist at all). All blocked for different
  # reasons; running the test here instead sidesteps needing the binary to
  # leave GitHub's infrastructure at all - only the pass/fail text log does.
  test-against-real-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libfreetype6-dev libasound2-dev \
            libcurl4-openssl-dev libfontconfig1-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxext-dev libxcomposite-dev mesa-common-dev \
            libgl1-mesa-dev pkg-config ninja-build

      - name: Download VCTK model
        run: curl -fL "https://play.forum.ircam.fr/rave-vst-api/get_model/VCTK" -o Resources/vctk_rave_model.ts

      - name: Fetch JUCE + LibTorch
        run: tools/setup_toolchain.sh

      - name: Configure + build offline_render_test
        run: |
          # Unquoted glob (not a python -c import) since a plain `import
          # torch` doesn't work in this venv either - see
          # tools/setup_toolchain.sh's comments on the CUDA-shim workaround.
          TORCH_ROOT=$(echo "$(pwd)"/libs/torch-venv/lib/python3.*/site-packages/torch)
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DTORCH_ROOT="$TORCH_ROOT"
          cmake --build build --target offline_render_test --parallel

      - name: Run against the real VCTK checkpoint
        run: ./build/offline_render_test Resources/vctk_rave_model.ts
