name: Windows VST3 build

# Manual trigger only (Actions tab -> this workflow -> Run workflow), so it
# never runs as a side effect of a push. Uses a GitHub-hosted windows-latest
# runner: free/unlimited standard-runner minutes on a public repo, which is
# the whole point - this project's own dev environment is Linux and can't
# produce or sign a real Windows binary (see README's Windows section).
on:
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch JUCE + Windows LibTorch
        shell: pwsh
        run: tools/setup_toolchain_windows.ps1

      - name: Put LibTorch DLLs on PATH
        shell: pwsh
        run: |
          # JUCE's own post-build step (juce_vst3_helper.exe) LoadLibrary()s
          # the freshly-linked plugin DLL immediately after linking, to
          # generate its VST3 manifest - before this project's own
          # DLL-copy-next-to-the-plugin POST_BUILD command gets to run (both
          # are chained into one command line; JUCE's runs first and this
          # build failed right there: "LoadLibraryW failed ... The specified
          # module could not be found" because torch_cpu.dll wasn't
          # discoverable yet). Windows' DLL search order also checks PATH, so
          # putting torch's lib dir there up front sidesteps the ordering
          # entirely rather than fighting over which POST_BUILD command runs
          # first.
          $torchLib = (Resolve-Path "libs/torch-venv/Lib/site-packages/torch/lib").Path
          $torchLib | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Set up MSVC dev environment (cl.exe/link.exe on PATH)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        shell: pwsh
        run: |
          $torchRoot = (Resolve-Path "libs/torch-venv/Lib/site-packages/torch").Path
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DTORCH_ROOT="$torchRoot" `
            -DHALLUCINATOR_BUILD_TOOLS=OFF

      - name: Build
        shell: pwsh
        run: cmake --build build --parallel

      - name: Package dist/windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\windows | Out-Null
          Copy-Item -Recurse -Force `
            "build\HallucinatorRAVE_artefacts\Release\VST3\HallucinatorRAVE.vst3" `
            "dist\windows\"

      - name: Bundle the VCTK model into the plugin package
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Single self-contained download for whoever installs this: the
          # plugin auto-loads a model sitting at this conventional path
          # (see HallucinatorAudioProcessor::findBundledDefaultModel) with
          # no separate "go find and load a model" step. gh CLI talks to
          # the Releases API directly, sidestepping the presigned-S3-URL
          # issue that blocks a plain curl/redirect from the project's own
          # (differently network-policied) Linux dev sandbox.
          $resourcesDir = "dist\windows\HallucinatorRAVE.vst3\Contents\Resources"
          New-Item -ItemType Directory -Force -Path $resourcesDir | Out-Null
          gh release download vctk-rave-model-v1 --repo sprizzlesites/HALLUCINATOR `
            --pattern "vctk_rave_model.ts" --output "$resourcesDir\default_rave_model.ts" --clobber

      - name: Locate signtool (not always on PATH by default on this runner image)
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "\\x64\\" } | Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found under Windows Kits 10" }
          Write-Host "Found signtool at $($signtool.FullName)"
          (Split-Path $signtool.FullName) | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Ad-hoc sign (self-signed "Sprizzle" cert, not a CA-trusted signature)
        shell: pwsh
        run: tools/sign_windows_adhoc.ps1 -VstPath "dist\windows\HallucinatorRAVE.vst3"

      - name: Verify plugin loads from an isolated directory (DLL search-path smoke test)
        shell: pwsh
        run: |
          # Regression test for a real bug report: FL Studio showed a
          # generic scan "error" (no vendor name, no effect/synth category,
          # never got a chance to open the UI) because the plugin DLL
          # itself failed to load - Windows' DLL search order for a
          # *dependent* DLL only checks the hosting process's own
          # directory and PATH, never "the directory the requesting DLL
          # lives in", so torch_cpu.dll/c10.dll sitting next to the plugin
          # binary were invisible to any host that isn't this CI job (which
          # had put torch's lib dir on PATH for its own build/test
          # convenience - see "Put LibTorch DLLs on PATH" above). Fixed via
          # /DELAYLOAD + Source/Windows/DelayLoadHook.cpp. This step copies
          # the signed bundle to an unrelated directory, strips PATH down
          # to just the OS defaults, and loads the actual plugin binary via
          # LoadLibraryW - simulating exactly what a real DAW does.
          $isolated = "C:\isolated_plugin_test"
          New-Item -ItemType Directory -Force -Path $isolated | Out-Null
          Copy-Item -Recurse -Force "dist\windows\HallucinatorRAVE.vst3" "$isolated\"
          $env:Path = "$env:SystemRoot\System32;$env:SystemRoot"

          $sig = 'using System; using System.Runtime.InteropServices; namespace W32 { public static class N { [DllImport("kernel32.dll", CharSet = CharSet.Unicode, SetLastError = true)] public static extern IntPtr LoadLibraryW(string lpFileName); } }'
          Add-Type -TypeDefinition $sig

          $dllPath = Join-Path $isolated "HallucinatorRAVE.vst3\Contents\x86_64-win\HallucinatorRAVE.vst3"
          $handle = [W32.N]::LoadLibraryW($dllPath)
          if ($handle -eq [IntPtr]::Zero) {
              $err = [System.Runtime.InteropServices.Marshal]::GetLastWin32Error()
              throw "LoadLibraryW failed (Win32 error $err) loading the plugin from an isolated directory with a clean PATH - this is exactly the failure mode reported under FL Studio. torch_cpu.dll/c10.dll are not being found."
          }
          Write-Host "Plugin binary loaded successfully from an isolated directory with a clean PATH."

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path "dist\windows\HallucinatorRAVE.vst3" -DestinationPath "HallucinatorRAVE-windows-vst3.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: HallucinatorRAVE-windows-vst3
          path: HallucinatorRAVE-windows-vst3.zip
          retention-days: 14
