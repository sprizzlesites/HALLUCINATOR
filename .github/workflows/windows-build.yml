name: Windows VST3 build

# Manual trigger only (Actions tab -> this workflow -> Run workflow), so it
# never runs as a side effect of a push. Uses a GitHub-hosted runner: free/
# unlimited standard-runner minutes on a public repo, which is the whole
# point - this project's own dev environment is Linux and can't produce or
# sign a real Windows binary (see README's Windows section).
#
# Deliberately windows-2022, NOT windows-latest: windows-latest currently
# resolves to a "windows-2025-vs2026" image (Visual Studio 2026 - a preview/
# insider toolchain, confirmed via a real user's diagnostic investigation).
# A binary built with it needs runtime components (UCRT/VCRuntime) that
# don't exist yet on ordinary Windows installations - CI's own smoke test
# passed every time because that SAME image has the matching bleeding-edge
# components, while a real user's machine (even fully patched via normal
# Windows Update, even after installing the official VS2022/v17 VC++
# Redistributable - which is a DIFFERENT, older runtime generation) kept
# failing with "module not found" trying to load torch_cpu.dll/fbgemm.dll.
# windows-2022 (VS2022, "v17") is the stable, widely-deployed generation
# that redistributable actually matches.
on:
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch JUCE + Windows LibTorch
        shell: pwsh
        run: tools/setup_toolchain_windows.ps1

      - name: List every DLL under the torch venv (diagnostic)
        shell: pwsh
        run: |
          # A real user's diagnostic run showed torch_cpu.dll and fbgemm.dll
          # failing to load standalone (Win32 error 126) even with every
          # torch/lib/*.dll present and correctly sized - no mkl_*.dll files
          # anywhere in that folder. CMakeLists.txt's TORCH_RUNTIME_DLLS only
          # globs torch/lib/*.dll; if MKL's own runtime installed somewhere
          # else in this venv (a separate pip package sometimes lands
          # outside torch/lib/), that's the missing piece. This lists every
          # .dll anywhere under the venv so the exact path is known instead
          # of guessed.
          Get-ChildItem -Path "libs\torch-venv" -Recurse -Filter "*.dll" |
            Select-Object -ExpandProperty FullName

      - name: Put LibTorch DLLs on PATH
        shell: pwsh
        run: |
          # JUCE's own post-build step (juce_vst3_helper.exe) LoadLibrary()s
          # the freshly-linked plugin DLL immediately after linking, to
          # generate its VST3 manifest - before this project's own
          # DLL-copy-next-to-the-plugin POST_BUILD command gets to run (both
          # are chained into one command line; JUCE's runs first and this
          # build failed right there: "LoadLibraryW failed ... The specified
          # module could not be found" because torch_cpu.dll wasn't
          # discoverable yet). Windows' DLL search order also checks PATH, so
          # putting torch's lib dir there up front sidesteps the ordering
          # entirely rather than fighting over which POST_BUILD command runs
          # first.
          $torchLib = (Resolve-Path "libs/torch-venv/Lib/site-packages/torch/lib").Path
          $torchLib | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Set up MSVC dev environment (cl.exe/link.exe on PATH)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        shell: pwsh
        run: |
          $torchRoot = (Resolve-Path "libs/torch-venv/Lib/site-packages/torch").Path
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DTORCH_ROOT="$torchRoot" `
            -DHALLUCINATOR_BUILD_TOOLS=OFF

      - name: Build
        shell: pwsh
        run: cmake --build build --parallel

      - name: Package dist/windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\windows | Out-Null
          Copy-Item -Recurse -Force `
            "build\HallucinatorRAVE_artefacts\Release\VST3\HallucinatorRAVE.vst3" `
            "dist\windows\"

      - name: Bundle the VCTK model into the plugin package
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Single self-contained download for whoever installs this: the
          # plugin auto-loads a model sitting at this conventional path
          # (see HallucinatorAudioProcessor::findBundledDefaultModel) with
          # no separate "go find and load a model" step. gh CLI talks to
          # the Releases API directly, sidestepping the presigned-S3-URL
          # issue that blocks a plain curl/redirect from the project's own
          # (differently network-policied) Linux dev sandbox.
          $resourcesDir = "dist\windows\HallucinatorRAVE.vst3\Contents\Resources"
          New-Item -ItemType Directory -Force -Path $resourcesDir | Out-Null
          gh release download vctk-rave-model-v1 --repo sprizzlesites/HALLUCINATOR `
            --pattern "vctk_rave_model.ts" --output "$resourcesDir\default_rave_model.ts" --clobber

      - name: Locate signtool (not always on PATH by default on this runner image)
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "\\x64\\" } | Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found under Windows Kits 10" }
          Write-Host "Found signtool at $($signtool.FullName)"
          (Split-Path $signtool.FullName) | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Ad-hoc sign (self-signed "Sprizzle" cert, not a CA-trusted signature)
        shell: pwsh
        run: tools/sign_windows_adhoc.ps1 -VstPath "dist\windows\HallucinatorRAVE.vst3"

      - name: Verify plugin loads from an isolated directory (DLL search-path smoke test)
        shell: pwsh
        run: |
          # Regression test for a real bug report: FL Studio showed a
          # generic scan "error" (no vendor name, no effect/synth category,
          # never got a chance to open the UI) because the plugin DLL
          # itself failed to load - Windows' DLL search order for a
          # *dependent* DLL only checks the hosting process's own
          # directory and PATH, never "the directory the requesting DLL
          # lives in", so torch_cpu.dll/c10.dll sitting next to the plugin
          # binary were invisible to any host that isn't this CI job (which
          # had put torch's lib dir on PATH for its own build/test
          # convenience - see "Put LibTorch DLLs on PATH" above). Fixed via
          # a dependency-free shim (Source/Windows/PluginShim.cpp) that
          # explicitly loads the real implementation with
          # LOAD_WITH_ALTERED_SEARCH_PATH.
          #
          # This step copies the signed bundle to an unrelated directory,
          # strips PATH down to just the OS defaults, loads the actual
          # plugin binary via LoadLibraryW, and - since the shim itself has
          # no torch dependency and would load trivially either way - also
          # calls GetPluginFactory() to force it to load the real impl DLL,
          # so this test actually exercises the fix rather than just
          # proving the lightweight shim loads.
          $isolated = "C:\isolated_plugin_test"
          New-Item -ItemType Directory -Force -Path $isolated | Out-Null
          Copy-Item -Recurse -Force "dist\windows\HallucinatorRAVE.vst3" "$isolated\"
          $env:Path = "$env:SystemRoot\System32;$env:SystemRoot"

          # A named delegate type (rather than System.Func[...]) sidesteps a
          # PowerShell generic-type-resolution quirk: [Func[IntPtr]] passed
          # to GetDelegateForFunctionPointer intermittently resolves to the
          # *open* generic Func<> instead of the closed Func<IntPtr>,
          # throwing "The specified Type must not be a generic type."
          $sig = 'using System; using System.Runtime.InteropServices; namespace W32 { public delegate IntPtr GetPluginFactoryDelegate(); public static class N { [DllImport("kernel32.dll", CharSet = CharSet.Unicode, SetLastError = true)] public static extern IntPtr LoadLibraryW(string lpFileName); [DllImport("kernel32.dll", CharSet = CharSet.Ansi, SetLastError = true)] public static extern IntPtr GetProcAddress(IntPtr hModule, string procName); } }'
          Add-Type -TypeDefinition $sig

          $dllPath = Join-Path $isolated "HallucinatorRAVE.vst3\Contents\x86_64-win\HallucinatorRAVE.vst3"
          $handle = [W32.N]::LoadLibraryW($dllPath)
          if ($handle -eq [IntPtr]::Zero) {
              $err = [System.Runtime.InteropServices.Marshal]::GetLastWin32Error()
              throw "LoadLibraryW failed (Win32 error $err) loading the plugin shim from an isolated directory with a clean PATH."
          }
          Write-Host "Plugin shim loaded successfully from an isolated directory with a clean PATH."

          $factoryProc = [W32.N]::GetProcAddress($handle, "GetPluginFactory")
          if ($factoryProc -eq [IntPtr]::Zero) {
              throw "GetProcAddress(GetPluginFactory) failed - the shim binary doesn't export the expected VST3 entry point."
          }
          $factoryDelegate = [System.Runtime.InteropServices.Marshal]::GetDelegateForFunctionPointer($factoryProc, [W32.GetPluginFactoryDelegate])
          $factory = $factoryDelegate.Invoke()
          if ($factory -eq [IntPtr]::Zero) {
              throw "GetPluginFactory() returned null - this is exactly the failure mode reported under FL Studio: the shim loaded, but forwarding to the real implementation (HallucinatorRAVE_Impl.dll, which statically imports torch_cpu.dll/c10.dll) failed, meaning those still aren't being found from an isolated directory with a clean PATH."
          }
          Write-Host "GetPluginFactory() succeeded - the real implementation (with its torch dependency) loaded correctly via the shim."

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path "dist\windows\HallucinatorRAVE.vst3" -DestinationPath "HallucinatorRAVE-windows-vst3.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: HallucinatorRAVE-windows-vst3
          path: HallucinatorRAVE-windows-vst3.zip
          retention-days: 14

      # Standalone diagnostic tool (see tools/vst3_load_diagnostic.cpp) -
      # NOT part of the plugin itself, uploaded separately so it can be
      # handed to a user hitting a real-DAW load failure CI can't
      # reproduce, to run directly on their affected machine.
      - uses: actions/upload-artifact@v4
        with:
          name: vst3_load_diagnostic
          path: build\vst3_load_diagnostic.exe
          retention-days: 14
